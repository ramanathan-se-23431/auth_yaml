openapi: 3.0.3
info:
  title: GoRest - List Todos
  description: Public endpoint to list all todos. No authentication required.
  version: 1.0.0
servers:
- url: https://gorest.co.in/public/v2
paths:
  /todos:
    get:
      summary: List all todos
      description: Retrieve a paginated list of all todo items from GoRest.
      operationId: listTodos
      parameters:
      - name: page
        in: query
        description: Page number for pagination
        required: false
        schema:
          type: integer
          example: 1
      - name: per_page
        in: query
        description: Number of results per page
        required: false
        schema:
          type: integer
          example: 10
      - name: status
        in: query
        description: Filter todos by status
        required: false
        schema:
          type: string
          enum:
          - pending
          - completed
      responses:
        "200":
          description: A list of todos retrieved successfully
