openapi: 3.0.3
info:
  title: GoRest - Get Comments
  version: 1.0.0
servers:
  - url: https://gorest.co.in/public/v2
paths:
  /comments:
    get:
      summary: List all comments
      operationId: listComments
      parameters:
        - name: page
          in: query
          schema: { type: integer, example: 1 }
        - name: post_id
          in: query
          schema: { type: integer, example: 101 }
      responses:
        "200":
          description: A list of comments
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:      { type: integer, example: 201 }
                    post_id: { type: integer, example: 101 }
                    name:    { type: string,  example: "Jane Doe" }
                    email:   { type: string,  example: "jane@example.com" }
                    body:    { type: string,  example: "Great post!" }
