openapi: 3.0.3
info:
  title: GoRest - List Posts
  description: Public endpoint to list all posts. No authentication required.
  version: 1.0.0
servers:
- url: https://gorest.co.in/public/v2
paths:
  /posts:
    get:
      summary: List all posts
      description: Retrieve a paginated list of all posts from GoRest.
      operationId: listPosts
      parameters:
      - name: page
        in: query
        description: Page number for pagination
        required: false
        schema:
          type: integer
          example: 1
      - name: per_page
        in: query
        description: Number of results per page
        required: false
        schema:
          type: integer
          example: 10
      - name: title
        in: query
        description: Filter posts by title keyword
        required: false
        schema:
          type: string
      responses:
        "200":
          description: A list of posts retrieved successfully
